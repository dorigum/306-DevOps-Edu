<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>폼 태그</title>
  </head>
  <body>
    <!-- form 태그는 사용자로부터 데이터를 입력받는 태그 -->
    <!-- action : 데이터를 전송할 주소 -->
    <!-- method : 데이터를 전송하는 방식 -->
    <!-- get : 주소 뒤에 ?키=값&키=값 형태로 데이터를 붙여서 전송 -->
    <!-- post : 데이터를 숨겨서 전송 -->
    <h1>폼 요소 알아보기</h1>
    <form action="ex01_start.html" method="post">
      <label for="userId">아이디 : </label
      ><input type type="text" name="id" id="usderId" value="koo" /><br />
      비번 : <input type="password" name="pwd" /><br />
      이름 :
      <input type="text" name="pwd" id="name" maxlength="5" /><br /><br /><br />
      <fieldset>
        <legend>취미 선택</legend>
        <!-- checkbox는 name이 같아도, 달라도 상관없다.
         단, 같으면 하나의 이름으로 배열을 다룰 수 있다.
         보통 같은 이름으로 많이 사용 -->
        <input type="checkbox" name="hobby" id="hobby" value="A" />등산
        <input type="checkbox" name="hobby" id="hobby" value="B" checked />낚시
        <input type="checkbox" name="hobby" id="hobby" value="C" />수영
        <input type="checkbox" name="hobby" id="hobby" value="D" checked />골프
      </fieldset>

      <fieldset>
        <legend>성별 선택</legend>
        <!-- radio는 단일 선택, 그 기준은 name이 동일한 그룹 내에서 단일 선택 -->
        <input type="radio" name="gender" id="male" value="man" />남자
        <input
          type="radio"
          name="gender"
          id="female"
          value="woman"
          checked
        />여자
      </fieldset>

      <textarea name="content" cols="20" rows="5"></textarea><br /><br />

      <select name="job" id="job" size="3" multiple>
        <option value="0">--선택--</option>
        <option value="선생님" selected>선생님</option>
        <option value="개발자">개발자</option>
        <option value="디자이너">디자이너</option>
        <option value="엔지니어">엔지니어</option>
        <option value="웹개발자">웹개발자</option>
        <option value="DBA">DBA</option></select
      ><br />

      <!-- button 태그는 폼 요소 안에 있으면 기본이 submit이고,
       폼 요소 밖에 있으면 기본이 button-->
      <button>클릭1</button>

      <button type="button">클릭2</button>
      <button type="reset">클릭3</button>
      <button type="submit">클릭4</button>
    </form>

    <button>클릭5</button>
  </body>
</html>
