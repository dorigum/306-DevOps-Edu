<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 1050" width="1100" height="1050" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect width="1100" height="1050" fill="#f8f9fa" rx="12"/>

  <!-- Title -->
  <text x="550" y="40" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">카페 키오스크 유즈케이스 다이어그램</text>
  <text x="550" y="62" text-anchor="middle" font-size="13" fill="#555">Java 기반 카페 키오스크 서비스 (5조)</text>
  <line x1="80" y1="74" x2="1020" y2="74" stroke="#ccc" stroke-width="1.5"/>

  <!-- ====== SYSTEM BOUNDARY ====== -->
  <rect x="230" y="85" width="760" height="930" fill="white" stroke="#4a90d9" stroke-width="2" stroke-dasharray="8,4" rx="10"/>
  <text x="610" y="107" text-anchor="middle" font-size="14" font-weight="bold" fill="#4a90d9">카페 키오스크 시스템</text>

  <!-- ========================== -->
  <!-- SECTION: 비회원 / 공통 -->
  <!-- ========================== -->
  <rect x="248" y="118" width="722" height="195" fill="#fff8e1" stroke="#f9a825" stroke-width="1.5" rx="8"/>
  <text x="260" y="138" font-size="12" font-weight="bold" fill="#e65100">비회원 / 회원 공통 기능</text>

  <ellipse cx="360" cy="175" rx="68" ry="24" fill="#fff3e0" stroke="#f9a825" stroke-width="1.5"/>
  <text x="360" y="171" text-anchor="middle" font-size="11" fill="#333">카테고리별</text>
  <text x="360" y="185" text-anchor="middle" font-size="11" fill="#333">메뉴 조회</text>

  <ellipse cx="520" cy="175" rx="68" ry="24" fill="#fff3e0" stroke="#f9a825" stroke-width="1.5"/>
  <text x="520" y="171" text-anchor="middle" font-size="11" fill="#333">추천 메뉴 조회</text>
  <text x="520" y="185" text-anchor="middle" font-size="11" fill="#333">(인기/신규)</text>

  <ellipse cx="680" cy="175" rx="68" ry="24" fill="#fff3e0" stroke="#f9a825" stroke-width="1.5"/>
  <text x="680" y="171" text-anchor="middle" font-size="11" fill="#333">장바구니</text>
  <text x="680" y="185" text-anchor="middle" font-size="11" fill="#333">조회 / 관리</text>

  <ellipse cx="850" cy="175" rx="68" ry="24" fill="#fff3e0" stroke="#f9a825" stroke-width="1.5"/>
  <text x="850" y="171" text-anchor="middle" font-size="11" fill="#333">메뉴 옵션 선택</text>
  <text x="850" y="185" text-anchor="middle" font-size="11" fill="#333">및 주문 / 결제</text>

  <ellipse cx="430" cy="280" rx="68" ry="24" fill="#fff3e0" stroke="#f9a825" stroke-width="1.5"/>
  <text x="430" y="284" text-anchor="middle" font-size="11" fill="#333">신제품 메뉴 조회</text>

  <ellipse cx="620" cy="280" rx="68" ry="24" fill="#fff3e0" stroke="#f9a825" stroke-width="1.5"/>
  <text x="620" y="284" text-anchor="middle" font-size="11" fill="#333">회원가입</text>

  <!-- ========================== -->
  <!-- SECTION: 회원 전용 -->
  <!-- ========================== -->
  <rect x="248" y="330" width="722" height="290" fill="#e8f5e9" stroke="#43a047" stroke-width="1.5" rx="8"/>
  <text x="260" y="350" font-size="12" font-weight="bold" fill="#1b5e20">회원 전용 기능</text>

  <ellipse cx="360" cy="390" rx="68" ry="24" fill="#f1f8e9" stroke="#43a047" stroke-width="1.5"/>
  <text x="360" y="394" text-anchor="middle" font-size="11" fill="#333">로그인 / 로그아웃</text>

  <ellipse cx="520" cy="390" rx="68" ry="24" fill="#f1f8e9" stroke="#43a047" stroke-width="1.5"/>
  <text x="520" y="386" text-anchor="middle" font-size="11" fill="#333">회원 정보 조회</text>
  <text x="520" y="400" text-anchor="middle" font-size="11" fill="#333">/ 수정 (MY)</text>

  <ellipse cx="680" cy="390" rx="68" ry="24" fill="#f1f8e9" stroke="#43a047" stroke-width="1.5"/>
  <text x="680" y="386" text-anchor="middle" font-size="11" fill="#333">포인트 적립</text>
  <text x="680" y="400" text-anchor="middle" font-size="11" fill="#333">및 사용</text>

  <ellipse cx="850" cy="390" rx="68" ry="24" fill="#f1f8e9" stroke="#43a047" stroke-width="1.5"/>
  <text x="850" y="386" text-anchor="middle" font-size="11" fill="#333">관심 상품</text>
  <text x="850" y="400" text-anchor="middle" font-size="11" fill="#333">조회 / 관리</text>

  <ellipse cx="360" cy="480" rx="68" ry="24" fill="#f1f8e9" stroke="#43a047" stroke-width="1.5"/>
  <text x="360" y="476" text-anchor="middle" font-size="11" fill="#333">주문 이력 기반</text>
  <text x="360" y="490" text-anchor="middle" font-size="11" fill="#333">맞춤 메뉴 추천</text>

  <ellipse cx="520" cy="480" rx="68" ry="24" fill="#f1f8e9" stroke="#43a047" stroke-width="1.5"/>
  <text x="520" y="476" text-anchor="middle" font-size="11" fill="#333">최근 주문 기반</text>
  <text x="520" y="490" text-anchor="middle" font-size="11" fill="#333">퀵오더</text>

  <ellipse cx="680" cy="480" rx="68" ry="24" fill="#f1f8e9" stroke="#43a047" stroke-width="1.5"/>
  <text x="680" y="476" text-anchor="middle" font-size="11" fill="#333">주문 이력 조회</text>
  <text x="680" y="490" text-anchor="middle" font-size="11" fill="#333">(전자 영수증)</text>

  <ellipse cx="850" cy="480" rx="68" ry="24" fill="#f1f8e9" stroke="#43a047" stroke-width="1.5"/>
  <text x="850" y="476" text-anchor="middle" font-size="11" fill="#333">주문 추가</text>
  <text x="850" y="490" text-anchor="middle" font-size="11" fill="#333">(기존 주문 불변)</text>

  <!-- note for member -->
  <rect x="258" y="530" width="700" height="78" fill="#f9fbe7" stroke="#c5e1a5" stroke-width="1" rx="6"/>
  <text x="272" y="549" font-size="11" fill="#558b2f">※ 회원은 포인트 사용 시 결제 금액에서 포인트만큼 차감되며,</text>
  <text x="272" y="565" font-size="11" fill="#558b2f">   이미 완료된 주문 내역은 수정 불가 → 주문 추가만 가능합니다.</text>
  <text x="272" y="581" font-size="11" fill="#558b2f">   회원가입 시 전화번호(ID)와 비밀번호만 입력합니다.</text>
  <text x="272" y="597" font-size="11" fill="#c62828">   ※ 주문 내역 삭제 기능 없음 (피드백 반영)</text>

  <!-- ========================== -->
  <!-- SECTION: 관리자 전용 -->
  <!-- ========================== -->
  <rect x="248" y="640" width="722" height="358" fill="#fce4ec" stroke="#e53935" stroke-width="1.5" rx="8"/>
  <text x="260" y="660" font-size="12" font-weight="bold" fill="#b71c1c">관리자 전용 기능</text>

  <ellipse cx="360" cy="700" rx="68" ry="24" fill="#fff0f0" stroke="#e53935" stroke-width="1.5"/>
  <text x="360" y="696" text-anchor="middle" font-size="11" fill="#333">메뉴 등록 /</text>
  <text x="360" y="710" text-anchor="middle" font-size="11" fill="#333">수정 / 삭제</text>

  <ellipse cx="520" cy="700" rx="68" ry="24" fill="#fff0f0" stroke="#e53935" stroke-width="1.5"/>
  <text x="520" y="696" text-anchor="middle" font-size="11" fill="#333">다중 옵션 관리</text>
  <text x="520" y="710" text-anchor="middle" font-size="11" fill="#333">(사이즈/온도/카페인)</text>

  <ellipse cx="680" cy="700" rx="68" ry="24" fill="#fff0f0" stroke="#e53935" stroke-width="1.5"/>
  <text x="680" y="696" text-anchor="middle" font-size="11" fill="#333">기간별 매출 조회</text>
  <text x="680" y="710" text-anchor="middle" font-size="11" fill="#333">(일 / 주 / 월)</text>

  <ellipse cx="850" cy="700" rx="68" ry="24" fill="#fff0f0" stroke="#e53935" stroke-width="1.5"/>
  <text x="850" y="696" text-anchor="middle" font-size="11" fill="#333">메뉴별/카테고리별</text>
  <text x="850" y="710" text-anchor="middle" font-size="11" fill="#333">판매량 조회</text>

  <ellipse cx="360" cy="790" rx="68" ry="24" fill="#fff0f0" stroke="#e53935" stroke-width="1.5"/>
  <text x="360" y="786" text-anchor="middle" font-size="11" fill="#333">주문 내용</text>
  <text x="360" y="800" text-anchor="middle" font-size="11" fill="#333">조회 / 관리</text>

  <ellipse cx="520" cy="790" rx="68" ry="24" fill="#fff0f0" stroke="#e53935" stroke-width="1.5"/>
  <text x="520" y="794" text-anchor="middle" font-size="11" fill="#333">주문 취소</text>

  <ellipse cx="680" cy="790" rx="68" ry="24" fill="#fff0f0" stroke="#e53935" stroke-width="1.5"/>
  <text x="680" y="786" text-anchor="middle" font-size="11" fill="#333">회원 목록</text>
  <text x="680" y="800" text-anchor="middle" font-size="11" fill="#333">조회</text>

  <ellipse cx="850" cy="790" rx="68" ry="24" fill="#fff0f0" stroke="#e53935" stroke-width="1.5"/>
  <text x="850" y="794" text-anchor="middle" font-size="11" fill="#333">회원 정보 조회</text>

  <ellipse cx="430" cy="880" rx="78" ry="24" fill="#fff0f0" stroke="#e53935" stroke-width="1.5"/>
  <text x="430" y="876" text-anchor="middle" font-size="11" fill="#333">판매 내역 통계 관리</text>
  <text x="430" y="890" text-anchor="middle" font-size="11" fill="#333">(카테고리/메뉴별 금액)</text>

  <ellipse cx="650" cy="880" rx="78" ry="24" fill="#fff0f0" stroke="#e53935" stroke-width="1.5"/>
  <text x="650" y="876" text-anchor="middle" font-size="11" fill="#333">관리자 계정 등록</text>
  <text x="650" y="890" text-anchor="middle" font-size="11" fill="#333">(운영자 등록)</text>

  <!-- 제외 안내 -->
  <rect x="258" y="925" width="700" height="62" fill="#fff9c4" stroke="#f9a825" stroke-width="1" rx="5"/>
  <text x="272" y="945" font-size="11" fill="#e65100" font-weight="bold">⚠ 제외 기능 안내</text>
  <text x="272" y="962" font-size="11" fill="#555">• 재고 관리(품절) 기능은 피드백 반영으로 제외되었습니다.</text>
  <text x="272" y="978" font-size="11" fill="#555">• 관리자만 주문 취소가 가능합니다.</text>

  <!-- ============================== -->
  <!-- ACTORS -->
  <!-- ============================== -->

  <!-- 비회원 -->
  <circle cx="100" cy="215" r="18" fill="#fff8e1" stroke="#f9a825" stroke-width="2"/>
  <line x1="100" y1="233" x2="100" y2="272" stroke="#f9a825" stroke-width="2"/>
  <line x1="74"  y1="250" x2="126" y2="250" stroke="#f9a825" stroke-width="2"/>
  <line x1="100" y1="272" x2="83"  y2="296" stroke="#f9a825" stroke-width="2"/>
  <line x1="100" y1="272" x2="117" y2="296" stroke="#f9a825" stroke-width="2"/>
  <text x="100" y="313" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">비회원</text>

  <!-- 회원 -->
  <circle cx="100" cy="430" r="18" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <line x1="100" y1="448" x2="100" y2="487" stroke="#43a047" stroke-width="2"/>
  <line x1="74"  y1="465" x2="126" y2="465" stroke="#43a047" stroke-width="2"/>
  <line x1="100" y1="487" x2="83"  y2="511" stroke="#43a047" stroke-width="2"/>
  <line x1="100" y1="487" x2="117" y2="511" stroke="#43a047" stroke-width="2"/>
  <text x="100" y="528" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">회원</text>

  <!-- 관리자 -->
  <circle cx="100" cy="745" r="18" fill="#fce4ec" stroke="#e53935" stroke-width="2"/>
  <line x1="100" y1="763" x2="100" y2="802" stroke="#e53935" stroke-width="2"/>
  <line x1="74"  y1="780" x2="126" y2="780" stroke="#e53935" stroke-width="2"/>
  <line x1="100" y1="802" x2="83"  y2="826" stroke="#e53935" stroke-width="2"/>
  <line x1="100" y1="802" x2="117" y2="826" stroke="#e53935" stroke-width="2"/>
  <text x="100" y="843" text-anchor="middle" font-size="13" font-weight="bold" fill="#b71c1c">관리자</text>

  <!-- ============================== -->
  <!-- ASSOCIATION LINES (직선)        -->
  <!-- ============================== -->

  <!-- 비회원 → 공통 UC (주황 실선) -->
  <line x1="118" y1="210" x2="292" y2="175" stroke="#f9a825" stroke-width="1.5"/>
  <line x1="118" y1="215" x2="452" y2="175" stroke="#f9a825" stroke-width="1.5"/>
  <line x1="118" y1="220" x2="612" y2="175" stroke="#f9a825" stroke-width="1.5"/>
  <line x1="118" y1="225" x2="782" y2="175" stroke="#f9a825" stroke-width="1.5"/>
  <line x1="118" y1="230" x2="362" y2="275" stroke="#f9a825" stroke-width="1.5"/>
  <line x1="118" y1="235" x2="552" y2="275" stroke="#f9a825" stroke-width="1.5"/>

  <!-- 회원 → 공통 UC (초록 점선) -->
  <line x1="118" y1="420" x2="292" y2="175" stroke="#43a047" stroke-width="1.2" stroke-dasharray="6,3"/>
  <line x1="118" y1="424" x2="452" y2="175" stroke="#43a047" stroke-width="1.2" stroke-dasharray="6,3"/>
  <line x1="118" y1="428" x2="612" y2="175" stroke="#43a047" stroke-width="1.2" stroke-dasharray="6,3"/>
  <line x1="118" y1="432" x2="782" y2="175" stroke="#43a047" stroke-width="1.2" stroke-dasharray="6,3"/>

  <!-- 회원 → 회원 전용 UC (초록 실선) -->
  <line x1="118" y1="440" x2="292" y2="390" stroke="#43a047" stroke-width="1.5"/>
  <line x1="118" y1="444" x2="452" y2="390" stroke="#43a047" stroke-width="1.5"/>
  <line x1="118" y1="448" x2="612" y2="390" stroke="#43a047" stroke-width="1.5"/>
  <line x1="118" y1="452" x2="782" y2="390" stroke="#43a047" stroke-width="1.5"/>
  <line x1="118" y1="456" x2="292" y2="480" stroke="#43a047" stroke-width="1.5"/>
  <line x1="118" y1="460" x2="452" y2="480" stroke="#43a047" stroke-width="1.5"/>
  <line x1="118" y1="464" x2="612" y2="480" stroke="#43a047" stroke-width="1.5"/>
  <line x1="118" y1="468" x2="782" y2="480" stroke="#43a047" stroke-width="1.5"/>

  <!-- 관리자 → 관리자 UC (빨강 실선) -->
  <line x1="118" y1="735" x2="292" y2="700" stroke="#e53935" stroke-width="1.5"/>
  <line x1="118" y1="739" x2="452" y2="700" stroke="#e53935" stroke-width="1.5"/>
  <line x1="118" y1="743" x2="612" y2="700" stroke="#e53935" stroke-width="1.5"/>
  <line x1="118" y1="747" x2="782" y2="700" stroke="#e53935" stroke-width="1.5"/>
  <line x1="118" y1="751" x2="292" y2="790" stroke="#e53935" stroke-width="1.5"/>
  <line x1="118" y1="755" x2="452" y2="790" stroke="#e53935" stroke-width="1.5"/>
  <line x1="118" y1="759" x2="612" y2="790" stroke="#e53935" stroke-width="1.5"/>
  <line x1="118" y1="763" x2="782" y2="790" stroke="#e53935" stroke-width="1.5"/>
  <line x1="118" y1="767" x2="352" y2="880" stroke="#e53935" stroke-width="1.5"/>
  <line x1="118" y1="771" x2="572" y2="880" stroke="#e53935" stroke-width="1.5"/>

  <!-- Legend -->
  <rect x="240" y="1005" width="620" height="36" fill="white" stroke="#ddd" rx="6"/>
  <line x1="258" y1="1023" x2="298" y2="1023" stroke="#f9a825" stroke-width="2"/>
  <text x="306" y="1027" font-size="11" fill="#555">비회원 연결</text>
  <line x1="378" y1="1023" x2="418" y2="1023" stroke="#43a047" stroke-width="2"/>
  <text x="426" y="1027" font-size="11" fill="#555">회원 연결 (실선)</text>
  <line x1="516" y1="1023" x2="556" y2="1023" stroke="#43a047" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="564" y="1027" font-size="11" fill="#555">공통 기능 포함 (점선)</text>
  <line x1="660" y1="1023" x2="700" y2="1023" stroke="#e53935" stroke-width="2"/>
  <text x="708" y="1027" font-size="11" fill="#555">관리자 연결</text>

</svg>
