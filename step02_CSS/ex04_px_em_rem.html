<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      /* body,
      html {
        height: 100%;
      } */

      .outer {
        background-color: salmon;
        /* width: 50%;
        height: 50%; */
        width: 50vw;
        height: 50vh;
        font-size: 32px;
      }

      .a {
        background-color: red;
        font-size: 1em;
      }

      .b {
        background-color: green;
        font-size: 1rem;
      }

      .c {
        background-color: blue;
        font-size: 0.5em;
      }

      /* 글꼴 선언 */
      @font-face {
        font-family: "myFont";
        src: url("./font/Jua-Regular.ttf");
      }

      /* 글꼴 적용 */
      * {
        font-family: "myFont", sans-serif;
      }
    </style>
  </head>
  <body>
    <!-- 단위: px / em / rem -->
    <div class="outer">
      단위: px / em / rem
      <div class="a">em: 부모 노드를 기준으로</div>
      <div class="b">rem: 루트 노드를 기준으로</div>
      <div class="c">px: 해상도를 기준으로(고정 단위)</div>
    </div>
  </body>
</html>
