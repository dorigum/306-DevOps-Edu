<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Destructuring - 구조 분해 할당</h1>
    <!-- 객체({})나 배열([])의 값을 쉽게 꺼내어 변수에 할당할 수 있도록 하는 문법 -->
    <script>
      // 1. 객체
      const emp = { empno: 10, ename: "koo", job: "teacher" };
      {
        // emp 객체에 있는 속성의 값을 변수에 담기 - 기존 방식
        let empno = emp.empno;
        let ename = emp.ename;
        let job = emp.job;

        console.log(empno, ename, job);
      }

      // 새로운 문법 - 구조 분해 할당
      {
        let {empno, ename, job} = emp;
        
        console.log(empno, ename, job);
      }

      {
        let {empno, job} = emp;

        console.log(empno, job);
      }

      // 없는 속성 값 - 기본 값 설정하기
      // 없는 속성: undefined -> 기본 값으로 설정한 값이 변수에 할당됨
      // 있는 속성: emp 객체에 있는 속성의 값이 변수에 할당됨
      {
        let {empno, job = "student", age = 20} = emp;

        console.log(empno, job, age);
      }

      // key와 변수 이름이 다른 경우
      {
        let {empno: no, job = "student", age = 20} = emp;

        console.log(no, job, age);
      }

      // -----------------------------------------------------------------
      // 2. 배열
      const jobs = ["학생", "강사"];
      {
        // 기존 방식
        let first = jobs[0];
        let second = jobs[1];

        console.log(first, second);
      }

      {
        // 구조 분해 할당
        let[first, second] = jobs;

        console.log(first, second);
      }

      const numbers = [10, 20, 30, 40, 50, 60, 70];
      {
        let [a, b, c] = numbers;

        console.log(a, b, c);
      }

      {
        let [, a, , , , b, c] = numbers;

        console.log(a, b, c);
      }

      // -----------------------------------------------------------------
      // a와 b의 값을 교환
      console.log("a와 b의 값을 교환 - 기존 치환 방식");
      {
        let a = 5, b = 3;
        console.log(a, b);

        let temp = a;
        a = b;
        b = temp;

        console.log(a, b);
      }

      console.log("a와 b의 값을 교환 - 구조 분해 할당");
      {
        let a = 5, b = 3;
        console.log(a, b);
        
        [b, a] = [a, b];

        console.log(a, b);
      }

      // ----------------------------------------------------------------
      // 함수를 리턴하는 값을 구조 분해 할당으로 받기
      const test = function() {
        // 기능
        return [10, 20, 30];
      }

      let result = test();
      console.log(result[0], result[2]);

      let [a, , b] = test();
      console.log(a, b);

      const test2 = function() {
        // 기능
        return {name: "미미", age: 20, addr: "서울"};
      }

      result = test2();
      console.log(result.name, result.age);

      let {addr, name} = test2();
      console.log(addr, name);

      // ----------------------------------------------------------------
      // 단축 속성명 사용하기
      {
        let name = "doyeon";
        let age = 20;
        let addr = "경기";

        // 객체
        let person = {
            name : name,
            age : age,
            addr : addr
        };

        console.log(person);

        // ----------------------------------------------------------------
        let person2 = {
            name,
            age,
            addr
        }

        console.log(person2);
      }

    </script>
  </body>
</html>
