<!doctype html>
<html>
  <head>
    <meta charset="EUC-KR" />
    <title>Insert title here</title>
    <style type="text/css">
      table {
        width: 400px;
        border: 1px red solid;
      }
      td,
      th {
        border: 1px gray solid;
      }
      a {
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <h1>테이블 동적으로 생성하기</h1>
    <a href="#" id="add">추가하기</a>

    <table id="table">
      <tr>
        <th>이름</th>
        <th>나이</th>
        <th>삭제하기</th>
      </tr>

      <!-- 동적으로 tr 추가 또는 제거 -->
      <script>
        // 동적 이벤트로 테이블의 tr 추가하기
        document.body.addEventListener("click", function () {
            if (event.target.matches("#add")) {
              let tr = document.createElement("tr"); // tr 요소 생성
              tr.innerHTML =
                "<td>홍길동</td><td>20</td><td><a href='#' class='del'>삭제하기</a></td>"; // tr 요소의 내부 HTML 설정
              document.querySelector("#table").appendChild(tr); // table 요소에 tr 추가
            } else if (event.target.matches(".del")) {
                // 삭제하기 버튼 클릭 시
                let tr = event.target.parentElement.parentElement; // a -> td -> tr
                tr.parentElement.removeChild(tr); // tr의 부모 요소인 table에서 tr 제거
            }
          }, false);
      </script>
    </table>
  </body>
</html>
