<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h2>Array 함수</h2>
    <script>
      const students = [
        { name: "A", age: 20, state: true, score: 80 },
        { name: "B", age: 29, state: true, score: 85 },
        { name: "C", age: 22, state: false, score: 90 },
        { name: "D", age: 21, state: true, score: 45 },
        { name: "E", age: 28, state: false, score: 95 },
      ];

      // 1. 점수가 90점인 학생 정보 - find() -> 한 개를 찾으면 break
      /* let re = students.find((student) => {
        console.log(student);
        return student.score === 90;
      });
      console.log(re); */

      let re = students.find((student) => student.score === 90);
      console.log(re);

      // 2. 점수가 90점인 이상인 모든 학생 - filter() => 결과를 새로운 배열로 만든다.(true인 경우에만)
      re = students.filter((student) => student.score >= 90);
      console.log(re);

      // 3. 수강 중(state-true) 학생들만 골라서 배열로 만들기 - filter()
      state = students.filter((student) => student.state);
      console.log(state);

      // 4. 학생 배열에서 점수만 뽑아서 배열로 만들기 - map() => 결과를 새로운 배열로 만든다.
      scores = students.map((student) => student.score);
      console.log(scores);

      // 5. 학생들 중에 점수가 50점보다 낮은 친구 있는지 없는지 체크하기 - some() => true, false
      first = students.some((student) => student.score < 50);
      console.log(first);

      // 6. 모든 학생들의 점수가 80이상인지 체크 - every() => true, false
      second = students.every((student) => student.score >= 80);
      console.log(second);

      // 7. 학생들의 평균 점수를 구하기 - reduce() => 점수를 모아서 모두 더하고 인원 수로 나눈다.
      console.log("-----------------reduce()-----------------");
      /* students.reduce((prev, currv) => {
        console.log(prev);
        console.log(currv);
        
        console.log("---------------------------------");
        return prev + currv.score; // 점수 누적
      }, 0); */

      avg = students.reduce((prev, currv) => prev + currv.score, 0) / students.length;
      console.log("avg = " + avg);
      // console.log("avg = " + avg / students.length);

      // 8. 학생들의 모든 점수를 구해서 하나의 string으로 변환(map, join)
      s = students.map((s) => s.score).join(" | ");
      console.log(s);
      
      // 9. 학생들의 모든 점수를 배열로 만들어서 50점 이상인 학생들만 뽑아서 하나의 string으로 변환(map, filter, join);
      allScores = students.map((s) => s.score).filter((score)=> score >= 50).join(" / ");
      console.log(allScores);

      // 10. 학생들의 점수를 정렬하기 - sort()
      // arrScore = students.sort((s1, s2) => s1.score - s2.score); // -> 원본 데이터도 함께 변경
      arrScore = students.toSorted((s1, s2) => s1.score - s2.score); // -> 원본 데이터는 변경 안함
      
      console.log(arrScore);
      console.log("---------------------------------");
      console.log(students); // 정렬 후에 원본 데이터가 변경되었는지 확인해보기
    </script>
  </body>
</html>
