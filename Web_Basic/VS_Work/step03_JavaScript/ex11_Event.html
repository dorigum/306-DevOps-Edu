<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      /*
      이벤트 등록 방법
        1) 태그에 속성으로 on이벤트종류 = "기능"

        2) JavaScript에서 element를 찾아서 등록
            - 이벤트주체.on이벤트종류 = 함수
                => 이벤트 종류는 모두 소문자이다.
                   ※ 함수 이름 옆에 () 붙이면 안 된다!! - 즉시 실행이 된다!!!

            - 이벤트주체.addEventListener(이벤트종류, 함수, true | false);
                => 이벤트 종류는 소문자이다. / on은 붙이면 안 된다!
                => true: 버블링 방식 / false: 캡처링 방식
                   : 이벤트 전이가 버블링이나 캡처링을 세번째 인수가 결정함
                   : IE는 false만 지원(거의 false)

        body에 마크업된 element를 찾는 방법
        1) id로 찾기
            document.getElementById("아이디"); - 결과가 무조건 하나의 element

        2) class로 찾기 - document.getElementByClassName("클래스이름");
        3) 태그 이름으로 찾기 - document.getElementByTagName("태그이름");
        4) name으로 찾기 - document.getElementByName("Name이름");
            * 2) 3) 4) 인 경우는 결과가 배열로 나온다. (NodeList)(index 관리 필수!)

        5) selecter(선택자) 를 이용해서 찾기
            document.querySelecter("selecter"); - 결과가 한 개
            document.querySelecterAll("selecter"); - 결과가 한 개 이상
       */

      // -------------------------------------------------------------------
      // 함수 작성
      const test01 = (th) => {
        console.log("클릭1을 눌렀어요.");
        console.log(th);
        th.style.color = "lightpink";
      };

      const test02 = function () {
        console.log("클릭2를 눌렀어요.");
        // 이벤트를 발생시키는 주체를 어떻게 알 수 있을까?
        let e = event.target;
        // console.log(e);
        e.style.border = "solid lightblue 3px";
      };

      // 이벤트 등록
      let btn2 = document.getElementById("btn2");
      console.log(btn2); // -> 순서대로 실헹하기 때문에(body 영역을 만나기 전) 값이 null로 출력됨

      // 이벤트 등록
      onload = function () {
        // let btn2 = document.getElementById("btn2");
        let btn2 = document.querySelector("#btn2"); // ("btn2"); 이라고 입력하면 태그로 인식함!
        // console.log(btn2);

        btn2.onclick = test02;

        console.log("-----------------------------------------");
        // button 세번째에 이벤트 등록하기
        let btnNodeList = document.querySelectorAll("button"); // button 찾기
        console.log(btnNodeList);

        // btnNodeList[2].addEventListener("click", test02, false);
        btnNodeList[2].addEventListener(
          "click",
          function () {
            event.target.style.fontSize = "30px";
          },
          false,
        );

        // 버튼 4개에 mouseover와 mouseout 이벤트 적용
        document.querySelectorAll("button").forEach(function (ele, index) {
          // .forEach(callbackfn:...)
          //   console.log(index + ", " + ele);

          ele.onmouseover = () => {
            event.target.style.width = "300px";
            event.target.style.height = "100px";
          };

          ele.addEventListener(
            "mouseout",
            function () {
              event.target.style.width = "300px";
              event.target.style.height = "100px";
            },
            false,
          );
        });
      }; // onload 끝
    </script>
  </head>
  <body>
    <h2>이벤트 처리하기</h2>
    <button onclick="test01(this)">클릭1</button><br /><br />
    <button id="btn2">클릭2</button><br /><br />
    <button>클릭3</button><br /><br />
    <button>클릭4</button><br /><br />
  </body>
</html>
