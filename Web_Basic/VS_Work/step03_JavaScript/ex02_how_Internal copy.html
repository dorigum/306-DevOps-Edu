<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      // 여기는 자바스크립트 영역입니다.
      /* 여러 줄 또는 부분 주석입니다.*/

      // 콘솔에 출력
      console.log("어디에 출력되나요?");

      // 브라우저에 출력
      document.write("<h1>난 어디에 나오니?</h1>");

      // 함수 작성
      function test(th) {
        // th는 this를 전달받는 매개변수
        // window.alert("함수입니다."); // 메시지 창
        // h2에 CSS 적용
        // elemnet를 찾는 방법 - id로 찾기
        // document.getElementById("h2").style.backgroundColor = "lightyellow";
        // document.getElementById("h2").style.color = "white";

        th.style.backgroundColor = "lightyellow";
        th.style.color = "white";
      }
    </script>
  </head>
  <body>
    <!-- 태그의 속성으로 이벤트 등록 -->
    <h2 onclick="test(this)" id="h2">JavaScript 시작하기</h2>
    <h2 onclick="test(this)">졸립다~</h2>
    <h3 id="h3">오늘은 수요일</h3>

    <script>
      // h3 태그에 CSS 적용 - 문서가 열릴 때
      document.getElementById("h3").style.backgroundColor = "lightblue";
      document.getElementById("h3").style.color = "white";
    </script>
  </body>
</html>
