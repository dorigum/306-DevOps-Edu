 <body>
 <h2> 대/소 분류</h2>
 <form name="f">
   <select name="majang">
       <option value="0">--매장 선택 --</option>
	   <option value="kfc">KFC</option>
	   <option value="lotte">롯데리아</option>
	   <option value="king">버거킹</option>
	   <option value="mac">맥도널드</option>
   </select>
   <select name="menu">
       <option value="0">--선택 --</option>
   </select>
 </form>

  <script type="text/javascript">
      // 각 매장마다 버거의 종류를 준비
      let kfc = ["징거버거", "타워버거", "불고기버거"];
      let lotte = ["라이스버거", "데리버거", "새우버거", "한우버거", "치즈버거"];
      let king = ["불고기와퍼", "치즈와퍼","쥬니어와퍼" ,"쉬림프버거", "스테이크버거", "감자칩"];
      let mac = ["1997버거", "맥모닝", "빅맥", "베이컨버거", "치킨버거"];

      document.querySelector("[name = majang]").addEventListener("change", function() {
        let majangValue = event.target.value;
        // alert(majangValue);
        // alert(eval(majangValue));

        let submenu = new Function("return " + majangValue)(); // (): 즉시 실행
        // alert(submenu);
        
        let subSel = document.querySelector("[name = menu]");

        // 기존 서브 메뉴를 삭제
        while(subSel.length > 1) {
        	subSel.options[0] = null; // 첫번째 option 태그 삭제
            // -> [0]으로 고정 -> option 태그가 하나씩 삭제되면서, 다음 option 태그가 [0]이 됨
        }

        submenu.forEach((menuName, index) => {
        	// console.log(menuName + " = " + index);
            let op = new Option(menuName, menuName);
            subSel.options[subSel.length] = op;
        });

        // // 첫번째 선택 박스에서 매장을 선택하면, 두번째 선택 박스에 해당 매장의 버거 종류가 option으로 추가
        // let sel = document.querySelector("[name = menu]");
        // sel.options.length = 1; // option 태그를 모두 삭제하고, 첫번째 option 태그만 남김
      
        // for(let i = 0; i < submenu.length; i++) {
        // 	let op = new Option(submenu[i], submenu[i]);
        // 	sel.options[sel.length] = op;
        // }
      }, false);
  </script>
 </body>
</html>
