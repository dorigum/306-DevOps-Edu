<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Insert title here</title>
    <link rel="stylesheet" type="text/css" href="css/basic.css" />
    <style type="text/css">
      .poster {
        width: 150px;
        height: 150px;
      }

      a {
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <button name="delItem">삭제</button>
    <hr />

	<script>
		// localStorage에 저장된 찜 리스트 조회하기
		window.addEventListener("load", () => {
			getInfo();
		});

		const getInfo = function () {
			let len = localStorage.length;
			let str = "";
			for (let i = 0; i < len; i++) {
				let key = localStorage.key(i);
				let value = localStorage.getItem(key);
				str += key + " : " + value + "<br>";
			}

			// div 영역에 메시지를 출력
			document.getElementById("content").innerHTML = str;
		}
	</script>
    <article class="main">
      <section>
        <table width="80%" align="center">
          <caption class="caption">
            찜 리스트
          </caption>
          <thead>
            <tr>
              <th>이미지</th>
              <th>상품번호</th>
              <th>상품이름</th>
              <th>가격</th>
              <th>삭제</th>
            </tr>
          </thead>
          <tbody id="content">
            <!-- 찜목록 출력 -->

          </tbody>
        </table>
      </section>
      <section class="toalprice" id="price">
        <!-- 가격 -->

      </section>
      <section class="link">
        <table align="center">
          <tr>
            <td align="center">
              <a href="">주문하러 가기</a>
              <a href="index.html">DVD LIST</a>
            </td>
          </tr>
        </table>
      </section>
    </article>
  </body>
</html>
