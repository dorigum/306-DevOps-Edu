<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Optional Chaining - (?.)</h1>
    <!-- 
        객체의 속성이나 메소드에 안전하게 접근하기 위한 문법 
        : 중첩된 객체 구조에서 존재하지 않는 속성에 접근해도 오류가 발생하지 않고,
          undifined를 반환하도록 하는 것 
    -->

    <script>
      const person1 = {
        name: "doyeon",
        job: {
          title: "instructor",
          manager: {
            name: "sujin",
          },
        },
      };

      const person2 = {
        name: "doyeon",
      };

      // ----------------------------------------------------------------
      const print = function (p) {
        // p의 manager 정보를 조회
        // console.log(p.job.manager.name);
        //     if (p) {
        //       if (p.job) {
        //         if (p.job.manager) {
        //           console.log(p.job.manager.name);
        //         }
        //       }
        //     }
        //   };

        // && 또는 || 특징을 이용해서 작성하기
        // p && p.job && p.job.manager && console.log(p.job.manager.name);

        // Optional Chaining 변경
        let re = p?.job?.manager?.name;
        console.log(re);
      };

      // 함수 호출
      print(person1);
      console.log("--------------------------------");
      print(person2);
    </script>
  </body>
</html>
