    <style>
    /* 1. 3분할 가로 배치 (Flex 적용) */
    #main article {
      display: flex;
      justify-content: space-between; /* 카드들 사이의 간격을 균일하게 띄우기 */
      gap: 30px; /* 카드 사이의 여백 */

    /* 2. 개별 카드 디자인 */

      flex: 1; /* 3개의 카드가 남은 공간을 똑같이(1:1:1) 나누어 가지도록 */

      border-radius: 10px;
      padding: 20px;
      text-align: center;
      box-shadow: 2px 4px 12px rgba(0,0,0,0.1); /* 카드에 살짝 입체감 주기 */
    }

    /* 3. 카드 안의 이미지 크기 맞추기 */
    #main section img {
      width: 100%;
      border-radius: 5px;
      margin-bottom: 15px;
    }

    /* 4. 카드 안의 버튼 디자인 */
    #main section button {
      padding: 10px 20px;
      background-color: plum;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer; /* 마우스를 올리면 손가락 모양으로 바뀜 */
      margin-top: 10px;
    }
