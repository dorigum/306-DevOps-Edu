    <link rel="stylesheet" href="css/footer.css" type="text/css" />
    <title>IT's KOSTA</title>
    <style>
      main article {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: auto;
        gap: 10px;
        margin-top: 5px;
      }

      main article section img {
        width: 100%;
      }

      main article section button {
        padding: 5px;
        font-size: 15px;
        width: 80px;
        float: right;
      }
    </style>
  </head>
  <body>
    <header>
      <nav>
        <!-- 5개의 메뉴생성 -->

            /></a>

          <li><a href="busines.html">기업</a></li>
          <li><a href="login.html">로그인</a></li>
          <li><a href="register.html">회원가입</a></li>
        </ul>
      </nav>
    </header>

    <script src="js/banner.js">
      <div id="banner">지금 당신의 행복! IT's KOSTA Life!</div>
      // 1. banner의 텍스트를 주기적으로 변경한다. (5초마다)
      let bannerList = ["국민의 은행이 되겠습니다.", "5060 웰컴패키지, 최대 7만원의 혜택을 드립니다.", "타행이체, 자동이체 수수료 면제", "저녁 6시까지 영업합니다."];

      // 2. main의 main-item class에 data-main-item-id를 추가하고
      // 각 버튼에 main-item-btn class를 추가한다.
      // 각 버튼을 클릭하면 data-main-item-id의 값을 console.log()로 출력한다.
      let mainItems = document.querySelectorAll("main article section");
      mainItems.forEach(function (item, index) {
        item.setAttribute("data-main-item-id", index);
        item.querySelector("button").classList.add("main-item-btn");
        item.querySelector("button").addEventListener("click", function () {
          console.log(item.getAttribute("data-main-item-id"));
        });
      });

    </script>
    <main>
      <article>
        <!-- 총 3개의 서브영역 -->
        <section>

        <section>

          <h2>제목3 : main-item 3</h2>
