<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ex0327_product</title>
  </head>
  <body>
    <script>
      const products = [
        { id: 1, name: "Laptop", price: 1200000, category: "electronics" },
        { id: 2, name: "Phone", price: 800000, category: "electronics" },
        { id: 3, name: "T-shirt", price: 30000, category: "clothing" },
        { id: 4, name: "Keyboard", price: 50000, category: "electronics" },
        { id: 5, name: "Sneakers", price: 90000, category: "clothing" },
      ];

      // 1. 가격이 10만원 이상인 첫 번째 상품 정보 - find()
      const prod01 = products.find((product) => product.price >= 100000);
      console.log("문제01:", prod01);

      // 2. 카테고리가 'clothing'인 모든 상품 정보 - filter()
      const prod02 = products.filter(
        (product) => product.category === "clothing",
      );
      console.log("문제02:", prod02);

      // 3. 모든 상품의 이름만 뽑아서 배열로 만들기 - map()
      const prod03 = products.map((product) => product.name);
      console.log("문제03:", prod03);

      // 4. 전자 제품 중 가격이 100만원 이상인 상품이 하나라도 있는지 확인 - filter() + some()
      // (1) filter로 전자제품만 먼저 거르고 ->
      // (2) some으로 100만원 이상이 있는지(true/false) 확인
      const prod04 = products
        .filter((product) => product.category === "electronics")
        .some((product) => product.price >= 1000000);
      console.log("문제04:", prod04);

      // 5. 모든 상품의 가격이 2만원 이상인지 확인 - every()
      const prod05 = products.every((product) => product.price >= 20000);
      console.log("문제05:", prod05);

      // 6. 모든 상품들의 총 금액 구하기 - reduce(), price 누적
      // 맨 끝의 '0'은 누적값의 시작을 0으로 하겠다는 뜻!(초기 값)
      const prod06 = products.reduce((sum, product) => sum + product.price, 0);
      console.log("문제06:", prod06);

      // 7. 상품 가격 기준으로 오름차순 정렬된 배열 생성, 원본 배열도 같이 변경 - sort()(원본 데이터 같이 변경됨)
      // a.price에서 b.price를 뺐을 때 음수가 나오면 a를 앞으로 보내고,
      // 양수가 나오면 b를 앞으로 보낸다.
      products.sort((a, b) => a.price - b.price); // 내림차순: b.rpice - a.price
      console.log("문제07:", products);

      // 8. 상품 이름을 기준으로 알파벳 순 정렬, 원본 배열은 그대로 유지
      // - toSorted()(원본 데이터 변경되지 않음), localeCompare()로 문자열을 사전 순(ex: 1, 10, 2, 3...) 기준으로 비교
      const prod08 = products.toSorted((a, b) => a.name.localeCompare(b.name));
      console.log("문제08:", prod08);

      // 9. 상품 배열의 처음 3개만 잘라서 새 배열로 반환 - slice(start, end)
      const prod09 = products.slice(0, 3);
      console.log("문제09:", prod09);

      // 10. 상품 배열에서 id가 3인 상품을 찾아 배열에서 제거
      // - findIndex(): 삭제할 요소의 위치 찾기, splice(): 해당 위치에서 요소 제거
      const targetIndex = products.findIndex((product) => product.id === 3);
      if (targetIndex !== -1) { // 만약 찾았다면(-1이 아니라면)
        products.splice(targetIndex, 1); // 그 위치에서 1개 자르기
      }
      console.log("문제10:", products);
    </script>
  </body>
</html>
